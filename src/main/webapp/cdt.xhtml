<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
	<meta charset="UTF-8" />
	<title>Simulador CDT</title>

	<link
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
		rel="stylesheet" />
</h:head>

<h:body>

	<div class="container mt-5">

		<div class="text-center mb-4">
			<h1>Simulador CDT</h1>
			<h4>Cálculo de inversión</h4>
		</div>

		<div class="card p-4">

			<h:form id="formCdt">

				<h2 class="mb-4">Datos del CDT</h2>

				<h:messages styleClass="text-danger mb-3" />

				<!-- INVERSIÓN -->
				<div class="mb-3">
					<label class="form-label">Inversión</label>

					<h:inputText id="inversion" value="#{cdt.inversion}"
						styleClass="form-control"
						required="true"
						requiredMessage="La inversión es obligatoria">

						<f:convertNumber />
					</h:inputText>

					<h:message for="inversion" styleClass="text-danger" />
				</div>

				<!-- INTERÉS -->
				<div class="mb-3">
					<label class="form-label">Interés (% E.A.)</label>

					<h:inputText id="interes" value="#{cdt.interes}"
						styleClass="form-control"
						required="true"
						requiredMessage="El interés es obligatorio">

						<f:convertNumber />
					</h:inputText>

					<h:message for="interes" styleClass="text-danger" />
				</div>

				<!-- PLAZO -->
				<div class="mb-3">
					<label class="form-label">Plazo (días)</label>

					<h:inputText id="plazo" value="#{cdt.plazo}"
						styleClass="form-control"
						required="true"
						requiredMessage="El plazo es obligatorio">

						<f:convertNumber />
					</h:inputText>

					<h:message for="plazo" styleClass="text-danger" />
				</div>

				<!-- BOTONES -->
				<div class="text-center">

					<h:commandButton value="Calcular"
						action="#{cdt.calcular}"
						styleClass="btn btn-primary px-4 me-2">

						<f:ajax execute="@form" render="tabla resultados" />
					</h:commandButton>

					<h:commandButton value="Limpiar"
						action="#{cdt.limpiar}"
						styleClass="btn btn-secondary px-4">

						<f:ajax render="@form" />
					</h:commandButton>

				</div>

				<br />

				<!-- TABLA -->
				<h:panelGroup id="tabla">

					<h3 class="mt-4">Resultados del CDT</h3>

					<h:dataTable id="resultados"
						value="#{cdt.resultados}"
						var="r"
						styleClass="table table-hover mt-3 text-center">

						<h:column>
							<f:facet name="header">Datos Calculados</f:facet>
							<h:outputText value="#{r.concepto}" />
						</h:column>

						<h:column>
							<f:facet name="header">Valor</f:facet>
							<h:outputText value="#{r.valor}">
								<f:convertNumber type="currency" currencySymbol="$"
									maxFractionDigits="2" groupingUsed="true" />
							</h:outputText>
						</h:column>

					</h:dataTable>

				</h:panelGroup>

			</h:form>

		</div>

		<footer class="text-center mt-4">
			<hr />
			<h5>Samuel Santiago Perez Peña</h5>
			<p>Programación Avanzada - 2026</p>
			<p>Universidad Distrital Francisco José de Caldas</p>
		</footer>

	</div>

</h:body>
</html>
